# Dependabot — SOC 2 CC9.1 (Vendor Risk Management)
#
# Weekly automated PRs for npm + GitHub Actions dependency updates.
# Closes the dependency audit H5 finding ("no automated security gates").
#
# Strategy:
#   - Group minor + patch updates into a single PR per ecosystem (less PR noise)
#   - Major updates get their own PR each (easier to evaluate breaking changes)
#   - Security advisories ALWAYS get an immediate dedicated PR

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Ignore Next.js majors here — handle as a deliberate planned upgrade
    # (the 14 → 16 jump in particular needs hands-on regression).
    # Also ignore @supabase/ssr minors until the codebase is rewritten to
    # satisfy the stricter generic typing introduced in 0.10.x (~25 sites
    # in app/api/* + components/ pass Record<string,unknown> to .update()
    # or reference columns not in the generated DB types). PR #8 caught
    # this on 2026-05-19. Re-enable when the typing-fix task is complete.
    ignore:
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: '@supabase/ssr'
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      # Same stricter-typing problem as @supabase/ssr above: supabase-js 2.110
      # tightened .insert()/.update() to reject Record<string,any> payloads,
      # infers `never` on untyped updates, and enforces exact .select() columns
      # — breaking ~30 sites across app/api/*. PR #16 caught this (fails CI
      # weekly since 2026-06-08). Pin until the typing-fix migration is done;
      # keeps the other minor/patch bumps flowing.
      - dependency-name: '@supabase/supabase-js'
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
