# GitHub Actions CI — SOC 2 CC8.1 (Change Management)
#
# Mandatory pre-deploy gates that the dependency audit (H5) flagged as
# the single biggest control deficiency: no automated security or quality
# checks were enforced before code reached production. This workflow runs
# on every push to main and every PR, gating the merge on:
#   1. Strict lockfile install (npm ci)
#   2. Dependency audit (high+critical fail the build)
#   3. Lint (catches the unescaped-apostrophe class of failures that killed
#      two deploys in May 2026)
#   4. TypeScript strict typecheck (catches the unused-variable class that
#      killed the ERC merchant page deploy)
#   5. Production build (catches everything else)
#
# Companion: ../dependabot.yml schedules weekly dependency PRs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read  # explicit minimum; default GITHUB_TOKEN scope is too broad

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (strict lockfile)
        run: npm ci

      - name: Dependency audit (fails on NEW high+critical, allowlists known)
        # Uses audit-ci (config: .audit-ci.json) so we get a STABLE gate:
        #   · Net-new HIGH/CRITICAL CVEs fail the build (the actual point)
        #   · Known unfixable HIGH advisories (Next 14.x batch + xlsx
        #     prototype pollution) are allowlisted with GHSA IDs and
        #     tracked separately in the SOC 2 audit report (H1, H2 of
        #     the dependencies audit — both need major-version upgrades).
        # When you upgrade Next or xlsx, remove the corresponding IDs
        # from .audit-ci.json so the gate tightens again.
        #
        # 2026-07-23 — three NEW high Next.js advisories landed and turned
        # main red. All three are fixed only by next@16 (semver-major from
        # our 14.2.35), so they are allowlisted pending that upgrade. Each
        # was checked against THIS codebase first, and none of the three
        # vulnerable surfaces is in use:
        #
        #   GHSA-m99w-x7hq-7vfj  DoS via App Router Server Actions
        #   GHSA-89xv-2m56-2m9x  SSRF via Server Actions on custom servers
        #     -> zero files contain 'use server', no serverActions config,
        #        and we run on Vercel rather than a custom server.
        #   GHSA-p9j2-gv94-2wf4  SSRF via rewrites with an attacker-
        #                        controlled destination hostname
        #     -> we declare no rewrites at all: next.config.js has no
        #        rewrites() and vercel.json has only installCommand,
        #        crons and headers.
        #
        # These suppress REAL advisories, they don't dismiss them. Re-check
        # the conditions above before adding a rewrite or a Server Action,
        # and drop all three IDs once Next is upgraded.
        run: npx audit-ci --config .audit-ci.json

      - name: Lint (next lint)
        run: npx next lint

      - name: TypeScript strict typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Production build
        run: npm run build
        env:
          # Build-time env stubs so Next can statically analyze. None of
          # these are real secrets — Vercel injects real values at deploy.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: https://portal.moderntax.io
